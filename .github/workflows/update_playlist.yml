name: Generate LocalNow EPG XML

on:
  workflow_dispatch:
  schedule:
    # Runs every hour, 15 minutes before the next hour (e.g., 00:45, 01:45, 02:45 UTC)
    - cron: '45 * * * *'

jobs:
  build-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run EPG generation script
        run: python generate_epg.py

      - name: Commit and push epg.xml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_options: '--no-verify'
          push_options: '--force'
          status_options: '--untracked-files=no'
          commit_message: "Automated EPG update"
          file_pattern: "epg.xml"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "GitHub Actions Bot <github-actions[bot]@users.noreply.github.com>"
          create_branch: false
